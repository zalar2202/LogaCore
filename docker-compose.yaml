services:
  logacore-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logacore-production
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://logatech.cloud
      - NEXT_PUBLIC_APP_URL=https://logatech.cloud
    ports:
      - '3333:3000'
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - logatech-network

networks:
  logatech-network:
    external: true
    name: coolify
