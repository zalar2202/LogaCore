services:
  logacore-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logacore-production
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://logatech.cloud
      - NEXT_PUBLIC_APP_URL=https://logatech.cloud
    ports:
      - '3333:3000'
    networks:
      - logatech-network

networks:
  logatech-network:
    external: true
    name: coolify
