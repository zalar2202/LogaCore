services:
  postgres:
    image: postgres:16-alpine
    container_name: logacore-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logacore
    ports:
      - '5432:5432'
    volumes:
      - logacore-pgdata:/var/lib/postgresql/data

volumes:
  logacore-pgdata:
